name: Sync Leetcode
on:
  workflow_dispatch:
  schedule:
    - cron: "3 22 * * *"
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Sync solutions
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          DESTINATION_FOLDER: solutions
        run: python scripts/sync_leetcode.py
      - name: Commit and push
        run: |
          git config user.name "Ababiya324"
          git config user.email "ababiyadarge@gmail.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "[LeetCode Sync] $(date -u +%Y-%m-%d)"
            git push
          fi
